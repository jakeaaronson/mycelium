<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium — Pyramid Viewer</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface2: #1c1c20;
    --border: #27272a;
    --text: #e4e4e7;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
    --accent-l0: #f59e0b;
    --accent-l1: #3b82f6;
    --accent-l2: #8b5cf6;
    --accent-l3: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: var(--accent-l1); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.3rem; }
  .header p { color: var(--text-muted); font-size: 0.85rem; }
  .header-right { font-size: 0.75rem; color: var(--text-dim); }

  .container {
    display: flex;
    height: calc(100vh - 90px);
  }

  .sidebar {
    width: 340px;
    min-width: 340px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .project-group { margin-bottom: 1.5rem; }
  .project-name {
    padding: 0.4rem 1.2rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .level-label {
    padding: 0.5rem 1.2rem 0.2rem;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .level-label.l0 { color: var(--accent-l0); }
  .level-label.l1 { color: var(--accent-l1); }
  .level-label.l2 { color: var(--accent-l2); }

  .nav-item {
    padding: 0.35rem 1.2rem 0.35rem 1.8rem;
    font-size: 0.82rem;
    color: var(--text-muted);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-item:hover {
    background: var(--surface);
    color: var(--text);
  }
  .nav-item.active {
    background: var(--surface2);
    color: var(--text);
    border-left-color: var(--accent-l1);
  }
  .nav-item .lines {
    font-size: 0.7rem;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .nav-item.l0-item { border-left-color: transparent; }
  .nav-item.l0-item.active { border-left-color: var(--accent-l0); }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 3rem;
    max-width: 900px;
  }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .content-header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .content-header .breadcrumb {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }
  .content-header .breadcrumb span { color: var(--text-muted); }
  .content-header h2 { font-size: 1.1rem; }
  .level-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    margin-left: 0.6rem;
    vertical-align: middle;
  }
  .level-badge.l0 { background: rgba(245,158,11,0.15); color: var(--accent-l0); }
  .level-badge.l1 { background: rgba(59,130,246,0.15); color: var(--accent-l1); }
  .level-badge.l2 { background: rgba(139,92,246,0.15); color: var(--accent-l2); }

  .markdown-body {
    font-size: 0.85rem;
    line-height: 1.7;
  }
  .markdown-body h1 { font-size: 1.2rem; margin: 1.5rem 0 0.8rem; font-weight: 600; }
  .markdown-body h2 { font-size: 1.05rem; margin: 1.3rem 0 0.6rem; font-weight: 600; color: var(--text); }
  .markdown-body h3 { font-size: 0.9rem; margin: 1rem 0 0.5rem; font-weight: 600; color: var(--text-muted); }
  .markdown-body p { margin: 0.5rem 0; color: var(--text-muted); }
  .markdown-body ul, .markdown-body ol { margin: 0.5rem 0; padding-left: 1.5rem; color: var(--text-muted); }
  .markdown-body li { margin: 0.25rem 0; }
  .markdown-body li > ul { margin: 0.15rem 0; }
  .markdown-body strong { color: var(--text); font-weight: 600; }
  .markdown-body em { font-style: italic; color: var(--text-muted); }
  .markdown-body code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.8rem;
    color: #e2b86b;
  }
  .markdown-body pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    margin: 0.8rem 0;
  }
  .markdown-body pre code {
    background: none;
    padding: 0;
    color: var(--text-muted);
    font-size: 0.8rem;
  }
  .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.8rem 0;
    font-size: 0.8rem;
  }
  .markdown-body th {
    text-align: left;
    padding: 0.5rem 0.8rem;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-weight: 600;
  }
  .markdown-body td {
    padding: 0.4rem 0.8rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
  }
  .markdown-body tr:hover td { background: var(--surface); }
  .markdown-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }
  .markdown-body blockquote {
    border-left: 3px solid var(--border);
    padding-left: 1rem;
    color: var(--text-dim);
    margin: 0.8rem 0;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
  }
  .stat-card .value { font-size: 1.4rem; font-weight: 700; }
  .stat-card .label { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.2rem; }
  .stat-card.l0 .value { color: var(--accent-l0); }
  .stat-card.l1 .value { color: var(--accent-l1); }
  .stat-card.l2 .value { color: var(--accent-l2); }

  .pyramid-visual {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 4px;
    margin: 2rem 0;
    max-width: 650px;
  }
  .pyramid-tier {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.7rem 1rem;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .pyramid-tier:hover { background: var(--surface); }
  .tier-bar { height: 8px; border-radius: 4px; flex-shrink: 0; }
  .tier-label { font-size: 0.8rem; min-width: 70px; font-weight: 600; }
  .tier-desc { font-size: 0.75rem; color: var(--text-dim); }

  .context-flow {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 1.5rem 0;
    flex-wrap: wrap;
  }
  .flow-box {
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .flow-arrow { color: var(--text-dim); font-size: 1.2rem; }

  /* Snapshots */
  .snap-group { margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 0.8rem; }
  .snap-label {
    padding: 0.4rem 1.2rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .snap-label .count {
    font-size: 0.65rem;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .snap-list { display: none; }
  .snap-list.open { display: block; }
  .snap-item {
    padding: 0.5rem 1.2rem 0.5rem 1.8rem;
    font-size: 0.78rem;
    color: var(--text-dim);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .snap-item:hover { background: var(--surface); color: var(--text-muted); }
  .snap-item.active { background: var(--surface2); color: var(--text); border-left-color: #10b981; }
  .snap-item .snap-date { color: var(--text-muted); font-size: 0.75rem; }
  .snap-item .snap-type {
    font-size: 0.6rem;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .snap-type.reflect { background: rgba(16,185,129,0.15); color: #10b981; }
  .snap-type.backup { background: rgba(245,158,11,0.15); color: var(--accent-l0); }
  .snap-detail { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.2rem; }

  .snap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    margin-bottom: 1rem;
  }
  .snap-card h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .snap-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 0.8rem 0; font-size: 0.8rem; color: var(--text-muted); }
  .snap-meta .label { color: var(--text-dim); font-size: 0.7rem; }
  .snap-projects { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .snap-projects span {
    font-size: 0.72rem;
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 3px;
    color: var(--text-muted);
  }
  .snap-restore-hint {
    margin-top: 1rem;
    padding: 0.8rem;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 6px;
    font-size: 0.78rem;
    color: #10b981;
  }
  .snap-restore-hint code { color: #10b981; background: rgba(16,185,129,0.15); }
  .snap-timeline {
    position: relative;
    padding-left: 1.2rem;
    border-left: 2px solid var(--border);
    margin: 1.5rem 0;
  }
  .snap-timeline-item {
    position: relative;
    padding: 0.8rem 0 0.8rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .snap-timeline-item:hover { background: var(--surface); border-radius: 0 6px 6px 0; }
  .snap-timeline-item::before {
    content: '';
    position: absolute;
    left: -1.45rem;
    top: 1.15rem;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
  }
  .snap-timeline-item.reflect::before { border-color: #10b981; background: rgba(16,185,129,0.3); }
  .snap-timeline-item.backup::before { border-color: var(--accent-l0); background: rgba(245,158,11,0.3); }

  @media (max-width: 800px) {
    .container { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 1.5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Mycelium</h1>
    <p>Pyramid documentation viewer — browse the hierarchy, see what loads when</p>
  </div>
  <div class="header-right">Built from 146 sessions / 212 MB</div>
</div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ── Data (auto-generated by build-viewer.py) ──
const DOCS = /* __DOCS_JSON__ */;
const CONTENT = /* __CONTENT_JSON__ */;
const SNAPSHOTS = /* __SNAPSHOTS_JSON__ */;

// ── Markdown Renderer ──
function renderMarkdown(md) {
  let h = md;
  // Fenced code blocks
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    '<pre><code>' + esc(code.trim()) + '</code></pre>');
  // Tables
  h = h.replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)*)/gm, (_, hdr, sep, body) => {
    const ths = hdr.split('|').filter(c=>c.trim()).map(c=>'<th>'+inl(c.trim())+'</th>').join('');
    const rows = body.trim().split('\n').map(r => {
      const tds = r.split('|').filter(c=>c.trim()).map(c=>'<td>'+inl(c.trim())+'</td>').join('');
      return '<tr>'+tds+'</tr>';
    }).join('');
    return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
  });
  // Headers
  h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Blockquotes
  h = h.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // HR
  h = h.replace(/^---$/gm, '<hr>');
  // Nested lists: indent-based
  h = h.replace(/^  - (.+)$/gm, '<sub-li>$1</sub-li>');
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/<sub-li>(.*?)<\/sub-li>/g, '<li style="margin-left:1.2rem">$1</li>');
  h = h.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Ordered lists
  h = h.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
  h = h.replace(/((?:<oli>.*<\/oli>\n?)+)/g, (m) => {
    return '<ol>' + m.replace(/<oli>(.*?)<\/oli>/g, '<li>$1</li>') + '</ol>';
  });
  // Paragraphs (lines that aren't already wrapped)
  h = h.replace(/^(?!<[hupoltbs]|$|\s*$)(.+)$/gm, '<p>$1</p>');
  // Inline
  h = inl(h);
  // Clean up empty paragraphs
  h = h.replace(/<p>\s*<\/p>/g, '');
  return h;
}

function inl(t) {
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  t = t.replace(/~~(.+?)~~/g, '<del>$1</del>');
  return t;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function lvlName(l) {
  return l === 0 ? 'Level 0 — Apex' : l === 1 ? 'Level 1 — Playbook' : l === 2 ? 'Level 2 — Reference' : '';
}
function lvlClass(l) {
  return l === 0 ? 'l0' : l === 1 ? 'l1' : l === 2 ? 'l2' : '';
}

// ── Build Sidebar ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  for (const [key, proj] of Object.entries(DOCS)) {
    html += '<div class="project-group">';
    html += '<div class="project-name">' + proj.name + '</div>';
    let curLevel = -1;
    for (const doc of proj.docs) {
      if (doc.level !== null && doc.level !== curLevel) {
        curLevel = doc.level;
        html += '<div class="level-label ' + lvlClass(doc.level) + '">' + lvlName(doc.level) + '</div>';
      }
      const lines = CONTENT[doc.id] ? CONTENT[doc.id].split('\n').length : 0;
      const lclass = doc.level === 0 ? ' l0-item' : '';
      html += '<div class="nav-item' + lclass + '" data-id="' + doc.id + '" onclick="showDoc(\''+doc.id+'\')"><span>' + doc.title + '</span>';
      if (doc.path) html += '<span class="lines">' + lines + 'L</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Snapshots section
  if (SNAPSHOTS && SNAPSHOTS.length > 0) {
    html += '<div class="snap-group">';
    html += '<div class="snap-label" onclick="toggleSnaps()"><span>RESTORE POINTS</span><span class="count">' + SNAPSHOTS.length + '</span></div>';
    html += '<div class="snap-list" id="snap-list">';
    for (const snap of SNAPSHOTS) {
      const typeClass = snap.type === 'backup' ? 'backup' : 'reflect';
      const typeLabel = snap.type === 'backup' ? 'backup' : 'L' + snap.level;
      const date = snap.timestamp.substring(0, 10);
      html += '<div class="snap-item" data-snap="' + snap.id + '" onclick="showSnap(\'' + snap.id + '\')">';
      html += '<div><span class="snap-date">' + date + '</span><span class="snap-type ' + typeClass + '">' + typeLabel + '</span></div>';
      html += '<div class="snap-detail">' + snap.files + ' files' + (snap.args ? ' — ' + snap.args.substring(0, 40) : '') + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  sb.innerHTML = html;
}

function toggleSnaps() {
  const list = document.getElementById('snap-list');
  if (list) list.classList.toggle('open');
}

// ── Show Snapshot Detail ──
function showSnap(id) {
  document.querySelectorAll('.nav-item, .snap-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector('.snap-item[data-snap="'+id+'"]');
  if (active) active.classList.add('active');

  const snap = SNAPSHOTS.find(s => s.id === id);
  if (!snap) return;

  const ct = document.getElementById('content');
  const isBackup = snap.type === 'backup';
  const typeLabel = isBackup ? '<span class="snap-type backup">full backup</span>' : '<span class="snap-type reflect">reflect L' + snap.level + '</span>';
  const date = snap.timestamp.length >= 10 ? snap.timestamp.substring(0, 10) : snap.timestamp;
  const time = snap.timestamp.length >= 19 ? snap.timestamp.substring(11, 19) : '';

  let projectTags = '';
  if (snap.projects && snap.projects.length) {
    projectTags = '<div class="snap-projects">' + snap.projects.map(p => '<span>' + p + '</span>').join('') + '</div>';
  }

  const undoCmd = isBackup
    ? './rollback.sh ' + snap.id
    : '/reflect undo';

  ct.innerHTML = `
    <div class="content-header">
      <div class="breadcrumb">Restore Points</div>
      <h2>Snapshot: ${date} ${typeLabel}</h2>
    </div>

    <div class="snap-card">
      <h3>${snap.id}</h3>
      <div class="snap-meta">
        <div><div class="label">Date</div>${date}${time ? ' ' + time : ''}</div>
        <div><div class="label">Type</div>${isBackup ? 'Full backup' : 'Reflect snapshot'}</div>
        <div><div class="label">Level</div>${snap.level}</div>
        <div><div class="label">Files</div>${snap.files}</div>
      </div>
      ${snap.args ? '<p style="color:var(--text-muted);font-size:0.82rem;margin-top:0.5rem">' + snap.args + '</p>' : ''}
      ${projectTags}
    </div>

    <div class="snap-restore-hint">
      To restore to this point, run:<br>
      <code>${undoCmd}</code>
    </div>

    ${snap.file_list && snap.file_list.length ? `
    <h3 style="margin:2rem 0 0.8rem;font-size:0.95rem">Files in Snapshot</h3>
    <table class="markdown-body" style="max-width:500px">
      <thead><tr><th>File</th><th style="text-align:right">Lines</th></tr></thead>
      <tbody>
        ${snap.file_list.map(f =>
          '<tr><td style="font-size:0.78rem"><code>' + f.path + '</code></td><td style="text-align:right;font-size:0.78rem">' + f.lines + '</td></tr>'
        ).join('')}
      </tbody>
    </table>
    ` : ''}

    <h3 style="margin:2rem 0 0.8rem;font-size:0.95rem">All Restore Points</h3>
    <div class="snap-timeline">
      ${SNAPSHOTS.map(s => {
        const d = s.timestamp.length >= 10 ? s.timestamp.substring(0, 10) : s.timestamp;
        const tl = s.type === 'backup' ? 'backup' : 'L' + s.level;
        const cls = s.type === 'backup' ? 'backup' : 'reflect';
        const highlight = s.id === id ? 'background:var(--surface);border-radius:0 6px 6px 0;' : '';
        return '<div class="snap-timeline-item ' + cls + '" style="' + highlight + '" onclick="showSnap(\'' + s.id + '\')">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<strong style="font-size:0.82rem">' + d + '</strong>' +
          '<span class="snap-type ' + cls + '">' + tl + '</span></div>' +
          '<div style="font-size:0.72rem;color:var(--text-dim);margin-top:0.2rem">' + s.files + ' files' + (s.args ? ' — ' + s.args.substring(0, 50) : '') + '</div>' +
          '</div>';
      }).join('')}
    </div>
  `;
  ct.scrollTop = 0;
}

// ── Show Document ──
function showDoc(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector('.nav-item[data-id="'+id+'"]');
  if (active) active.classList.add('active');
  const ct = document.getElementById('content');
  if (id === 'home') { ct.innerHTML = homePage(); ct.scrollTop = 0; return; }
  let doc = null, projName = '';
  for (const [k, p] of Object.entries(DOCS)) {
    const f = p.docs.find(d => d.id === id);
    if (f) { doc = f; projName = p.name; break; }
  }
  if (!doc || !CONTENT[id]) { ct.innerHTML = '<p style="color:var(--text-dim)">No content.</p>'; return; }
  const badge = doc.level !== null ? '<span class="level-badge '+lvlClass(doc.level)+'">'+lvlName(doc.level)+'</span>' : '';
  ct.innerHTML = '<div class="content-header"><div class="breadcrumb">'+projName+' / <span>'+(doc.path||'')+'</span></div><h2>'+doc.title+badge+'</h2></div><div class="markdown-body">'+renderMarkdown(CONTENT[id])+'</div>';
  ct.scrollTop = 0;
}

// ── Home ──
function homePage() {
  let l0=0, l1=0, l2=0, l1c=0, l2c=0;
  for (const p of Object.values(DOCS)) for (const d of p.docs) {
    const n = CONTENT[d.id] ? CONTENT[d.id].split('\n').length : 0;
    if (d.level===0) l0+=n;
    if (d.level===1) { l1+=n; l1c++; }
    if (d.level===2) { l2+=n; l2c++; }
  }
  return `
    <div style="max-width:700px">
      <h2 style="font-size:1.1rem;margin-bottom:0.5rem">Pyramid Documentation Viewer</h2>
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem">

        Playbooks and references load on demand per task type.
        Click any document in the sidebar to read it.
      </p>

      <div class="stats">
        <div class="stat-card l0"><div class="value">${l0}</div><div class="label">Lines always in context (L0)</div></div>
        <div class="stat-card l1"><div class="value">${l1c} / ${l1}L</div><div class="label">Playbooks — per task (L1)</div></div>
        <div class="stat-card l2"><div class="value">${l2c} / ${l2}L</div><div class="label">Reference — on demand (L2)</div></div>
        <div class="stat-card"><div class="value" style="color:var(--text-dim)">~87%</div><div class="label">Less always-loaded context</div></div>
      </div>

      <h3 style="margin:2rem 0 0.8rem;font-size:0.95rem">The Pyramid</h3>
      <div class="pyramid-visual">
        <div class="pyramid-tier">
          <div class="tier-bar" style="width:80px;background:var(--accent-l0)"></div>
          <div class="tier-label" style="color:var(--accent-l0)">Level 0</div>
          <div class="tier-desc">CLAUDE.md — always loaded, ~50 lines, identity + routing table</div>
        </div>
        <div class="pyramid-tier">
          <div class="tier-bar" style="width:200px;background:var(--accent-l1)"></div>
          <div class="tier-label" style="color:var(--accent-l1)">Level 1</div>
          <div class="tier-desc">Playbooks — loaded per task type (testing, deployment, git...)</div>
        </div>
        <div class="pyramid-tier">
          <div class="tier-bar" style="width:360px;background:var(--accent-l2)"></div>
          <div class="tier-label" style="color:var(--accent-l2)">Level 2</div>
          <div class="tier-desc">Reference — schemas, URLs, credentials. Loaded when a playbook points to them.</div>
        </div>
        <div class="pyramid-tier">
          <div class="tier-bar" style="width:520px;background:var(--accent-l3)"></div>
          <div class="tier-label" style="color:var(--accent-l3)">Level 3</div>
          <div class="tier-desc">Raw knowledge — code, git history. Never pre-loaded. Searched via tools.</div>
        </div>
      </div>

      <h3 style="margin:2rem 0 0.8rem;font-size:0.95rem">How It Flows</h3>
      <div class="context-flow">
        <div class="flow-box" style="background:rgba(245,158,11,0.15);color:var(--accent-l0)">User asks a question</div>
        <div class="flow-arrow">&rarr;</div>
        <div class="flow-box" style="background:rgba(245,158,11,0.15);color:var(--accent-l0)">L0 is already loaded</div>
        <div class="flow-arrow">&rarr;</div>
        <div class="flow-box" style="background:rgba(59,130,246,0.15);color:var(--accent-l1)">Routing table says: read playbook X</div>
        <div class="flow-arrow">&rarr;</div>
        <div class="flow-box" style="background:rgba(59,130,246,0.15);color:var(--accent-l1)">Model reads playbook</div>
        <div class="flow-arrow">&rarr;</div>
        <div class="flow-box" style="background:rgba(139,92,246,0.15);color:var(--accent-l2)">If needed: load reference</div>
        <div class="flow-arrow">&rarr;</div>
        <div class="flow-box" style="background:rgba(107,114,128,0.15);color:var(--accent-l3)">Search code/git as needed</div>
      </div>

      <h3 style="margin:2rem 0 0.8rem;font-size:0.95rem">Before &amp; After</h3>
      <table class="markdown-body" style="max-width:520px">
        <thead><tr><th>Project</th><th>Before</th><th>After (L0)</th><th>Cut</th></tr></thead>
        <tbody>
          <tr><td>activecomply-api</td><td>390 lines</td><td>~50 lines</td><td style="color:var(--accent-l0)">87%</td></tr>
          <tr><td>zeitgeist</td><td>295 lines</td><td>59 lines</td><td style="color:var(--accent-l0)">80%</td></tr>
          <tr><td>dashboard-app</td><td>398 lines</td><td><em>not yet converted</em></td><td>—</td></tr>

      </p>

}

// ── Init ──
buildSidebar();
showDoc('home');
</script>
</body>
